spring.application.name=gutenber-ws

# db
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Datasource
spring.datasource.url=jdbc:postgresql://postgres:5432/gutenberg-dev
spring.datasource.username=gutenberguser
spring.datasource.password=gutenbergpassword

# Flyway
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# Batch
spring.batch.job.enabled=false
batch.catalog.url=https://www.gutenberg.org/cache/epub/feeds/pg_catalog.csv
batch.catalog.download-path=/tmp/gutenberg-ws/pg_catalog.csv
batch.catalog.download.max-attempts=3
batch.catalog.download.retry-delay-ms=5000